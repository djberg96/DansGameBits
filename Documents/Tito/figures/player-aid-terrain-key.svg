<svg xmlns="http://www.w3.org/2000/svg" width="760" height="792" viewBox="0 0 760 792">
  <title>Tito annotated terrain key</title>
  <desc>Objective and Occupation Zone displays with lead lines identifying their terrain and game values.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#17201b"/>
    </marker>
  </defs>

  <g font-family="Arial,Helvetica,sans-serif" fill="#17201b">
    <text x="18" y="28" font-size="24" font-weight="700">Objective Display</text>

    <g font-size="18" font-style="italic" font-weight="600">
      <text x="16" y="67">Objective Name</text>
      <text x="610" y="67">Terrain Type</text>
      <text x="16" y="176">Yugoslav</text>
      <text x="680" y="122">Axis</text>
      <text x="437" y="278" font-size="16" text-anchor="middle">Recruitment Value</text>
      <text x="580" y="179" font-size="16">Victory Point Value</text>
      <text x="560" y="228" font-size="15">Intrinsic Defense Strength</text>
    </g>

    <g font-weight="700" text-anchor="middle">
      <text x="372" y="73" font-size="39">Trieste</text>
      <text x="500" y="73" font-size="38">&#x2605;</text>
    </g>

    <rect x="245" y="91" width="300" height="150" rx="2" fill="#f4f1e7"/>
    <path d="M245 91 H395 L245 241 Z" fill="#e34f5f"/>
    <rect x="395" y="91" width="150" height="150" fill="#b9c3c1"/>
    <rect x="245" y="91" width="300" height="150" rx="2"
          fill="none" stroke="#17201b" stroke-width="8"/>
    <path d="M395 91 V241" fill="none" stroke="#17201b" stroke-width="8"/>
    <g font-weight="700" text-anchor="middle">
      <text x="437" y="176" font-size="36">3</text>
      <text x="501" y="190" font-size="54">5</text>
      <text x="465" y="226" font-size="24">(16)</text>
    </g>

    <g fill="none" stroke="#17201b" stroke-width="2.2" marker-end="url(#arrow)">
      <path d="M156 62 H292"/>
      <path d="M605 62 H515"/>
      <path d="M106 170 H270"/>
      <path d="M675 117 H525"/>
      <path d="M437 258 V184"/>
      <path d="M574 174 H520"/>
      <path d="M554 223 H493"/>
    </g>

    <g font-size="18">
      <rect x="18" y="318" width="15" height="15" fill="#17201b"/>
      <text x="43" y="332">Industrial</text>
      <text x="164" y="333" font-size="25">&#x2605;</text>
      <text x="194" y="332">City</text>
      <text x="278" y="333" font-size="24">&#x2020;</text>
      <text x="303" y="332">Village</text>
      <text x="414" y="333" font-size="24">&#x2021;</text>
      <text x="440" y="332">Town</text>
      <text x="538" y="333" font-size="25">&#x2022;</text>
      <text x="565" y="332">Market Town</text>
    </g>

    <path d="M15 382 H745" fill="none" stroke="#59605c" stroke-width="1.5"/>
    <text x="18" y="414" font-size="24" font-weight="700">Occupation Zone Display</text>

    <g font-size="17" font-style="italic" font-weight="600">
      <text x="16" y="461">Name</text>
      <text x="600" y="417">Garrison Value</text>
      <text x="600" y="457">Alignment Value</text>
      <text x="600" y="497">Uprising Modifier</text>
      <text x="17" y="570">Mountain</text>
      <text x="17" y="701">Hide-away</text>
      <text x="245" y="776" text-anchor="middle">Partisan</text>
      <text x="380" y="776" text-anchor="middle">Axis</text>
      <text x="515" y="776" text-anchor="middle">Chetnik</text>
    </g>

    <g text-anchor="middle" font-size="40" font-weight="700">
      <text x="300" y="472" font-style="italic">Serbia</text>
      <text x="420" y="472">4</text>
      <text x="456" y="472">C</text>
      <text x="492" y="472">2</text>
    </g>

    <g stroke="#17201b" stroke-width="8" stroke-linejoin="round">
      <path d="M245 502 L185 607 L305 607 Z" fill="#e34f5f"/>
      <path d="M380 502 L320 607 L440 607 Z" fill="#b9c3c1"/>
      <path d="M515 502 L455 607 L575 607 Z" fill="#f4f1e7"/>
      <circle cx="245" cy="688" r="60" fill="#e34f5f"/>
      <circle cx="380" cy="688" r="60" fill="#b9c3c1"/>
      <circle cx="515" cy="688" r="60" fill="#f4f1e7"/>
    </g>

    <rect x="625" y="592" width="88" height="88" rx="12"
          fill="#f4f1e7" stroke="#17201b" stroke-width="7"/>
    <text x="669" y="709" font-size="17" font-style="italic" font-weight="600"
          text-anchor="middle">
      <tspan x="669">Neutral Chetnik</tspan>
      <tspan x="669" dy="18">Box</tspan>
    </text>

    <g fill="none" stroke="#17201b" stroke-width="2.2" marker-end="url(#arrow)">
      <path d="M67 456 H235"/>
      <path d="M594 412 H420 V439"/>
      <path d="M594 452 H540 V424 H456 V439"/>
      <path d="M594 492 L507 471"/>
      <path d="M101 565 H194"/>
      <path d="M115 696 H170"/>
    </g>
  </g>
</svg>
