    <rect x="48" y="86" width="123" height="48" fill="none" stroke="#9f1d20" stroke-width="6" />

    <text
      x="110"
      y="62"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="700"
      fill="#9f1d20"
    >B</text>

    <g stroke="#9f1d20" stroke-width="8" stroke-linecap="round">
      <line x1="53" y1="91" x2="166" y2="129" />
      <line x1="166" y1="91" x2="53" y2="129" />
    </g>

    <text
      x="110"
      y="157"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="200"
      fill="#9f1d20"
    >x1</text>

    <text
      x="178"
      y="180"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="600"
      fill="#9f1d20"
      text-decoration="underline"
    >6</text>
  </g>

  <g stroke="#3a3127" stroke-width="3" fill="none">
    <line x1="289" y1="599" x2="365" y2="624" />
    <polyline points="118,212 58,212 58,515 106,515" />
  </g>

</svg>
