<svg
  width="8in"
  height="7in"
  viewBox="0 0 800 700"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f2e6" />
      <stop offset="100%" stop-color="#efe5d4" />
    </linearGradient>
    <linearGradient id="unionBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ea9d8" />
      <stop offset="100%" stop-color="#5f89b9" />
    </linearGradient>
    <linearGradient id="confederateGray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9c2b8" />
      <stop offset="100%" stop-color="#a59c93" />
    </linearGradient>
  </defs>

  <rect width="800" height="700" fill="url(#paper)" />
  <text
    x="50"
    y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    fill="#1c1c1c"
  >Shenandoah Counter Key: Simple Style</text>

  <g transform="translate(335, 120)">
    <rect x="0" y="0" width="220" height="220" rx="10" fill="url(#unionBlue)" stroke="#111111" stroke-width="6" />

    <text
      x="18"
      y="58"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="56"
      font-weight="700"
      fill="#111111"
    >5</text>

    <rect x="64" y="72" width="92" height="75" fill="none" stroke="#111111" stroke-width="6" />

    <text
      x="44"
      y="109"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="700"
      fill="#ffffff"
    >C</text>

    <g stroke="#111111" stroke-width="8" stroke-linecap="round">
      <line x1="69" y1="77" x2="151" y2="142" />
      <line x1="151" y1="77" x2="69" y2="142" />
    </g>

    <text
      x="186"
      y="109"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="200"
      fill="#ffffff"
    >x1</text>

    <text
      x="178"
      y="180"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="600"
      fill="#111111"
      text-decoration="underline"
    >6</text>
  </g>

  <g stroke="#3a3127" stroke-width="3" fill="none">
    <line x1="353" y1="170" x2="270" y2="145" />
    <line x1="365" y1="229" x2="270" y2="229" />
    <line x1="445" y1="258" x2="470" y2="356" />
    <line x1="540" y1="226" x2="584" y2="226" />
  </g>

  <g fill="#1f1a14">
    <text x="133" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Combat Factor</text>
    <text x="125" y="216" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Formation</text>
    <text x="125" y="244" font-family="Georgia, 'Times New Roman', serif" font-size="20">
      <tspan text-decoration="underline">B</tspan><tspan>attle / </tspan><tspan text-decoration="underline">C</tspan><tspan>olumn</tspan>
    </text>
    <text x="470" y="376" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Unit Type</text>
    <text x="470" y="402" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18">(Infantry)</text>
    <text x="720" y="150" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Union Unit</text>
    <text x="360" y="495" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Confederate Unit</text>
    <text x="590" y="232" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Stacking Factor</text>
    <text x="590" y="256" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="18">(shown as xN)</text>
    <text x="725" y="636" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Movement Allowance Factor</text>
  </g>

  <g transform="translate(90, 405)">
    <rect x="0" y="0" width="220" height="220" rx="10" fill="url(#confederateGray)" stroke="#111111" stroke-width="6" />

    <text
