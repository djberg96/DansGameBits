<svg
  width="0.5in"
  height="0.5in"
  viewBox="0 0 100 100"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="confederateGray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9c2b8" />
      <stop offset="100%" stop-color="#a59c93" />
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="97" height="97" rx="4" fill="url(#confederateGray)" stroke="#111111" stroke-width="3" />
  <text
    id="combat_factor"
    x="50"
    y="21"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#9f1d20"
  >1</text>

  <rect x="29" y="33" width="42" height="34" fill="none" stroke="#9f1d20" stroke-width="3" />

  <text
    id="formation_type"
    x="15.5"
    y="50"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="700"
    fill="#9f1d20"
  >C</text>

  <circle cx="50" cy="50" r="7" fill="#9f1d20" />

  <g stroke="#9f1d20" stroke-width="5" stroke-linecap="round">
    <line x1="31" y1="65" x2="69" y2="35" />
  </g>

  <text
    id="stacking_factor"
    x="84.5"
    y="50"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="200"
    fill="#9f1d20"
  >x3</text>

  <text
    id="movement_allowance_factor"
    x="81"
    y="81"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="600"
    fill="#9f1d20"
    text-decoration="underline"
  >9</text>
</svg>
