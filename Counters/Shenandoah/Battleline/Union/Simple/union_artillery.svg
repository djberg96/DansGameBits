<svg
  width="0.5in"
  height="0.5in"
  viewBox="0 0 100 100"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="unionBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ea9d8" />
      <stop offset="100%" stop-color="#5f89b9" />
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="97" height="97" rx="4" fill="url(#unionBlue)" stroke="#111111" stroke-width="3" />
  <text
    id="combat_factor"
    x="10"
    y="27"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="700"
    fill="#f7fbff"
  >1</text>

  <rect x="29" y="33" width="42" height="34" fill="none" stroke="#f7fbff" stroke-width="3" />

  <text
    id="formation_type"
    x="15.5"
    y="50"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="700"
    fill="#ffffff"
  >C</text>

  <circle cx="50" cy="50" r="7" fill="#f7fbff" />

  <text
    id="stacking_factor"
    x="84.5"
    y="50"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="200"
    fill="#ffffff"
  >x3</text>

  <text
    id="movement_allowance_factor"
    x="81"
    y="81"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24"
    font-weight="600"
    fill="#f7fbff"
    text-decoration="underline"
  >8</text>
</svg>
