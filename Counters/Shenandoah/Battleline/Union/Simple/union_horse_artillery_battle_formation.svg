<svg
  width="0.5in"
  height="0.5in"
  viewBox="0 0 100 100"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="unionBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ea9d8" />
      <stop offset="100%" stop-color="#5f89b9" />
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="97" height="97" rx="4" fill="url(#unionBlue)" stroke="#111111" stroke-width="3" />
  <text
    id="combat_factor"
    x="10"
    y="27"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#f7fbff"
  >2</text>

  <rect x="22" y="39" width="56" height="22" fill="none" stroke="#f7fbff" stroke-width="3" />

  <text
    id="formation_type"
    x="50"
    y="28"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="700"
    fill="#ffffff"
  >B</text>

  <circle cx="50" cy="50" r="6" fill="#f7fbff" />

  <g stroke="#f7fbff" stroke-width="3.5" stroke-linecap="round">
    <line x1="24" y1="59" x2="76" y2="41" />
  </g>

  <text
    id="stacking_factor"
    x="50"
    y="69"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="200"
    fill="#ffffff"
  >x3</text>

  <foreignObject x="69" y="66" width="24" height="30">
    <div
      xmlns="http://www.w3.org/1999/xhtml"
      style="width:24px;height:30px;display:flex;align-items:flex-start;justify-content:center;"
    >
      <span
        id="movement_allowance_factor"
        style="display:inline-block;font-family:Georgia, 'Times New Roman', serif;font-size:24px;font-weight:600;line-height:1;color:#f7fbff;border-bottom:1.5px solid #f7fbff;padding-bottom:2px;"
      >9</span>
    </div>
  </foreignObject>
</svg>
