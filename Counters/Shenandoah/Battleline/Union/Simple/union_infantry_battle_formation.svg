<svg
  width="0.5in"
  height="0.5in"
  viewBox="0 0 100 100"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="unionBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ea9d8" />
      <stop offset="100%" stop-color="#5f89b9" />
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="97" height="97" rx="4" fill="url(#unionBlue)" stroke="#111111" stroke-width="3" />
  <text
    id="combat_factor"
    x="50"
    y="24"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#f7fbff"
  >5</text>

  <rect x="22" y="39" width="56" height="22" fill="none" stroke="#f7fbff" stroke-width="3" />

  <g stroke="#f7fbff" stroke-width="3.5" stroke-linecap="round">
    <line x1="24" y1="41" x2="76" y2="59" />
    <line x1="76" y1="41" x2="24" y2="59" />
  </g>

  <text
    id="stacking_factor"
    x="50"
    y="69"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="200"
    fill="#ffffff"
  >x1</text>

  <text
    id="movement_allowance_factor"
    x="81"
    y="81"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="600"
    fill="#f7fbff"
    text-decoration="underline"
  >6</text>

</svg>
