<svg
  width="8in"
  height="4.5in"
  viewBox="0 0 800 450"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f2e6" />
      <stop offset="100%" stop-color="#efe5d4" />
    </linearGradient>
    <linearGradient id="unionBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ea9d8" />
      <stop offset="100%" stop-color="#5f89b9" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#paper)" />

  <text
    x="50"
    y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    fill="#1c1c1c"
  >Shenandoah Counter Key</text>

  <text
    x="50"
    y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    fill="#3a3127"
  >Union unit counters use the same anatomy regardless of unit type.</text>

  <g transform="translate(70, 125)">
    <rect x="0" y="0" width="220" height="220" rx="10" fill="url(#unionBlue)" stroke="#111111" stroke-width="6" />
    <rect x="12" y="12" width="196" height="196" rx="4" fill="none" stroke="#e9f2ff" stroke-width="3" />

    <g transform="translate(154, 18)">
      <rect x="0" y="0" width="40" height="26" fill="#ffffff" stroke="#111111" stroke-width="2" />
      <rect x="1" y="1" width="38" height="2" fill="#b22234" />
      <rect x="1" y="5" width="38" height="2" fill="#b22234" />
      <rect x="1" y="9" width="38" height="2" fill="#b22234" />
      <rect x="1" y="13" width="38" height="2" fill="#b22234" />
      <rect x="1" y="17" width="38" height="2" fill="#b22234" />
      <rect x="1" y="21" width="38" height="2" fill="#b22234" />
      <rect x="1" y="1" width="16" height="12" fill="#3c3b6e" />
      <g fill="#ffffff">
        <circle cx="4" cy="4" r="0.8" />
        <circle cx="8.5" cy="4" r="0.8" />
        <circle cx="13" cy="4" r="0.8" />
        <circle cx="6.25" cy="7" r="0.8" />
        <circle cx="10.75" cy="7" r="0.8" />
        <circle cx="4" cy="10" r="0.8" />
        <circle cx="8.5" cy="10" r="0.8" />
        <circle cx="13" cy="10" r="0.8" />
      </g>
    </g>

    <text
      x="18"
      y="58"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="56"
      font-weight="700"
      fill="#111111"
    >1</text>

    <rect x="64" y="72" width="92" height="75" fill="none" stroke="#111111" stroke-width="6" />

    <text
      x="44"
      y="109"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="26"
      font-weight="700"
      fill="#ffffff"
    >C</text>

    <g stroke="#111111" stroke-width="8" stroke-linecap="round">
      <line x1="69" y1="77" x2="151" y2="142" />
      <line x1="151" y1="77" x2="69" y2="142" />
    </g>

    <text
      x="176"
      y="109"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="34"
      font-weight="700"
      fill="#ffffff"
    >1</text>

    <rect x="162" y="164" width="32" height="32" rx="3" fill="#4d8f45" stroke="#111111" stroke-width="3" />

    <text
      x="178"
      y="180"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="22"
      font-weight="700"
      fill="#ffffff"
    >6</text>
  </g>

  <g stroke="#3a3127" stroke-width="3" fill="none">
    <line x1="182" y1="166" x2="350" y2="126" />
    <line x1="115" y1="233" x2="350" y2="196" />
    <line x1="246" y1="234" x2="350" y2="266" />
    <line x1="110" y1="329" x2="350" y2="336" />
  </g>

  <g fill="#1f1a14">
    <text x="370" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Combat Factor</text>
    <text x="370" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Formation</text>
    <text x="370" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="20">`C` = Column Formation</text>
    <text x="370" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="20">`B` = Battle Formation</text>
    <text x="370" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Stacking Factor</text>
    <text x="370" y="342" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Movement Allowance Factor</text>
  </g>

  <text
    x="50"
    y="404"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    fill="#3a3127"
  >Unit symbol and flag identify the unit type and side, but the four labeled values above are the key game data fields.</text>
</svg>
